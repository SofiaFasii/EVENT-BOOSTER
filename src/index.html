<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVENT BOOSTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.scss" />
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <a href="#" class="header__logo">
            <img src="./img/logo.png" alt="Event Booster">
        </a>
        <div class="header__content">
            <h1 class="header__title">FIND BEST EVENTS AROUND THE WORLD</h1>
            <div class="header__search">
                <div class="header__search-keyword">
                    <input type="text" class="header__input" id="searchInput" placeholder="Start searching">
                    <button class="header__btn" id="searchBtn"></button>
                </div>
                <div class="header__search-country">
                    <input type="text" class="header__input-country"  placeholder="Choose country"npm sxta>
                </div>
            </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="main__container"></div>
    </main>

    <footer class="footer">
      <div class="footer__container"></div>
    </footer>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
